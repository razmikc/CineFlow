<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CineFlow — AI Video Orchestration</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050613">
  <meta name="description" content="CineFlow — A CloudFormation-like creative contract for scene-by-scene AI video generation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <app-root>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#050613;color:#a8acd0;font-family:system-ui;flex-direction:column;gap:1rem">
      <div style="width:36px;height:36px;border:3px solid rgba(140,160,255,.2);border-top-color:#8b5cf6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="font-size:0.85rem;letter-spacing:0.2em;text-transform:uppercase">Booting CineFlow</div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
  </app-root>
</body>
</html>
